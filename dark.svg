<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="cubeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .txt-primary { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #F8FAFC; font-weight: 700; }
    .txt-muted { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #94A3B8; font-size: 14px; }
    .terminal-body { font-family: 'SFMono-Regular', Consolas, monospace; fill: #A7F3D0; font-size: 15px; }
    .pill { fill: #0F172A; stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    .pill-text { font-family: -apple-system, BlinkMacSystemFont, sans-serif; fill: #E2E8F0; font-size: 13px; font-weight: 500; }
  </style>

  <rect width="1180" height="610" rx="16" fill="url(#bgGlow)" />
  <rect width="1178" height="608" x="1" y="1" rx="15" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>

  <g transform="translate(210, 270)">
    <circle cx="0" cy="0" r="110" fill="none" stroke="rgba(34,211,238,0.08)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="rgba(124,58,237,0.04)" stroke-width="1" stroke-dasharray="4,4"/>
    
    <g filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.05;0.28;0.33;1" dur="12s" repeatCount="indefinite"/>
      <g transform="scale(1.4)">
        <path d="M0 -60 L52 -30 L0 0 L-52 -30 Z" fill="url(#cubeGrad)" fill-opacity="0.25" stroke="#38BDF8" stroke-width="2"/>
        <path d="M-52 -30 L0 0 L0 60 L-52 30 Z" fill="url(#cubeGrad)" fill-opacity="0.15" stroke="#38BDF8" stroke-width="2"/>
        <path d="M0 0 L52 -30 L52 30 L0 60 Z" fill="url(#cubeGrad)" fill-opacity="0.35" stroke="#38BDF8" stroke-width="2"/>
        <line x1="0" y1="0" x2="0" y2="-60" stroke="#818CF8" stroke-width="1.5" stroke-dasharray="3,3"/>
        <circle cx="0" cy="0" r="4" fill="#61DAFB"/>
        <circle cx="0" cy="-60" r="4" fill="#38BDF8"/>
        <circle cx="52" cy="-30" r="4" fill="#38BDF8"/>
        <circle cx="-52" cy="-30" r="4" fill="#38BDF8"/>
      </g>
    </g>

    <g filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.38;0.61;0.66;1" dur="12s" repeatCount="indefinite"/>
      <g transform="scale(3.8)">
        <ellipse rx="16" ry="6" fill="none" stroke="#61DAFB" stroke-width="1.6" transform="rotate(0)"/>
        <ellipse rx="16" ry="6" fill="none" stroke="#61DAFB" stroke-width="1.6" transform="rotate(60)"/>
        <ellipse rx="16" ry="6" fill="none" stroke="#61DAFB" stroke-width="1.6" transform="rotate(120)"/>
        <circle cx="0" cy="0" r="4" fill="#61DAFB"/>
      </g>
    </g>

    <g transform="translate(-40,-50)" filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.66;0.71;0.95;0.98;1" dur="12s" repeatCount="indefinite"/>
      <g transform="scale(3.2)">
        <path d="M8 0h4a4 4 0 1 1 0 8H8V0z" fill="#2563EB"/>
        <path d="M0 8a4 4 0 0 1 4-4h4v8H4a4 4 0 0 1-4-4z" fill="#38BDF8"/>
        <path d="M0 0a4 4 0 0 1 4-4h4v8H4a4 4 0 0 1-4-4z" fill="#1D4ED8" transform="rotate(180 4 2)"/>
        <path d="M0 16a4 4 0 0 1 4-4h4v4a4 4 0 0 1-4 4 4 4 0 0 1-4-4z" fill="#60A5FA"/>
        <circle cx="12" cy="12" r="4" fill="#0EA5E9"/>
      </g>
    </g>
  </g>

  <g transform="translate(460, 60)">
    <rect width="660" height="490" rx="12" fill="#0F172A" fill-opacity="0.7" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <circle cx="25" cy="25" r="6" fill="#EF4444"/>
    <circle cx="45" cy="25" r="6" fill="#F59E0B"/>
    <circle cx="65" cy="25" r="6" fill="#10B981"/>

    <g transform="translate(30, 80)">
      <text x="0" y="20" class="txt-primary" font-size="24">Hi</text>
      <text x="0" y="60" class="txt-primary" font-size="44">I'm Shehan Dayananda</text>

      <text x="0" y="105" font-family="monospace" font-size="22" font-weight="bold" fill="url(#accentGrad)">
        <animate attributeName="opacity" values="0;1;1;0" dur="9s" repeatCount="indefinite"/>
        <tspan>3D Artist | UI/UX Designer | Frontend Developer</tspan>
      </text>

      <g class="terminal-body" transform="translate(0, 150)">
        <text x="0" y="20" opacity="0">
          <animate attributeName="opacity" from="0" to="1" begin="1s" dur="0.5s" fill="freeze"/>
          <tspan fill="#38BDF8">❯ location:</tspan> <tspan fill="#F1F5F9">Rathnapura, Sri Lanka</tspan>
        </text>
        <text x="0" y="50" opacity="0">
          <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
          <tspan fill="#38BDF8">❯ focus:</tspan> <tspan fill="#F1F5F9">Immersive 3D Assets &amp; Premium Web Frameworks</tspan>
        </text>
      </g>

      <g transform="translate(0, 250)">
        <text x="0" y="0" class="txt-primary" font-size="16">Core Expertise</text>
        <g transform="translate(0, 15)">
          <rect width="90" height="30" rx="6" class="pill"/>
          <text x="45" y="20" text-anchor="middle" class="pill-text">Blender 3D</text>
          <rect x="100" width="75" height="30" rx="6" class="pill"/>
          <text x="137.5" y="20" text-anchor="middle" class="pill-text">Figma</text>
          <rect x="185" width="75" height="30" rx="6" class="pill"/>
          <text x="222.5" y="20" text-anchor="middle" class="pill-text">React JS</text>
          <rect x="270" width="110" height="30" rx="6" class="pill"/>
          <text x="325" y="20" text-anchor="middle" class="pill-text">React Native</text>
        </g>
        <g transform="translate(0, 55)">
          <rect width="100" height="30" rx="6" class="pill"/>
          <text x="50" y="20" text-anchor="middle" class="pill-text">JavaScript</text>
          <rect x="110" width="95" height="30" rx="6" class="pill"/>
          <text x="157.5" y="20" text-anchor="middle" class="pill-text">Unity</text>
          <rect x="215" width="130" height="30" rx="6" class="pill"/>
          <text x="280" y="20" text-anchor="middle" class="pill-text">HTML5 / CSS3</text>
        </g>
      </g>
    </g>
  </g>
</svg>
